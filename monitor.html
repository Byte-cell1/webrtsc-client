<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor - WebRTC Meeting</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', sans-serif; }
body {
  background: #0f172a;
  min-height:100vh;
  color:#fff;
  padding:12px;
}
.header {
  background: rgba(255,255,255,0.05);
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  text-align:center;
}
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));
  gap:12px;
}
.video-box {
  background: rgba(255,255,255,0.05);
  border-radius:12px;
  padding:10px;
  border:1px solid rgba(255,255,255,0.1);
}
.video-box video {
  width:100%;
  height:200px;
  background:#000;
  border-radius:8px;
  object-fit:cover;
}
.name {
  text-align:center;
  margin-top:8px;
  font-size:14px;
  font-weight:600;
}
</style>
</head>
<body>
<div class="header">
  <h1>📺 Monitor - All Rooms</h1>
</div>
<div class="grid" id="videoGrid"></div>

<script>
const WS_URL = 'wss://webrtsc-server.onrender.com';
let ws, peers = {};

ws = new WebSocket(WS_URL);

ws.onopen = () => {
  ws.send(JSON.stringify({ type: 'join', role: 'monitor', roomId: 'all' }));
};

ws.onmessage = (e) => {
  const data = JSON.parse(e.data);
  if(data.type === 'user-joined') createVideoBox(data.userId, data.name);
  if(data.type === 'offer') handleOffer(data);
  if(data.type === 'ice-candidate') handleIce(data);
  if(data.type === 'user-left') removeVideo(data.userId);
};

function createVideoBox(userId, name) {
  const box = document.createElement('div');
  box.id = 'box-' + userId;
  box.className = 'video-box';
  box.innerHTML = `<video autoplay playsinline></video><div class="name">${name}</div>`;
  document.getElementById('videoGrid').appendChild(box);

  const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
  peers[userId] = pc;

  pc.ontrack = (e) => {
    box.querySelector('video').srcObject = e.streams[0];
  };

  pc.onicecandidate = (e) => {
    if(e.candidate) ws.send(JSON.stringify({ type: 'ice-candidate', target: data.from, candidate: e.candidate }));
  };
}

async function handleOffer(data) {
  const pc = peers[data.from];
  if(!pc) return;
  await pc.setRemoteDescription(data.offer);
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  ws.send(JSON.stringify({ type: 'answer', target: data.from, answer }));
}

async function handleIce(data) {
  const pc = peers[data.from];
  if(pc) await pc.addIceCandidate(data.candidate);
}

function removeVideo(userId) {
  document.getElementById('box-' + userId)?.remove();
  peers[userId]?.close();
  delete peers[userId];
}
</script>
</body>
</html>
