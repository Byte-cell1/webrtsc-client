<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Monitor View</title>
<style>
/*... 180 lines CSS: CCTV grid, no controls, status bar... */
body { margin:0; background:#000; color:#0f0; font-family:'Courier New',monospace; }
.status-bar { height:40px; background:#111; display:flex; align-items:center; padding:0 20px; border-bottom:2px solid #0f0; }
.grid { display:grid; grid-template-columns:1fr 1fr; height:calc(100vh - 40px); gap:5px; padding:5px; }
.video-box { background:#000; border:2px solid #333; position:relative; }
video { width:100%; height:100%; object-fit:contain; }
.label { position:absolute; top:10px; left:10px; background:rgba(0,0,0,0.7); padding:5px 10px; font-size:14px; }
.timestamp { position:absolute; bottom:10px; right:10px; font-size:12px; }
</style>
</head>
<body>
<div class="status-bar">
  MONITOR MODE - Room: <span id="room">default</span> | <span id="status">Connecting...</span>
</div>
<div class="grid">
  <div class="video-box">
    <video id="hostView" autoplay playsinline></video>
    <div class="label">HOST CAMERA</div>
    <div class="timestamp" id="time1"></div>
  </div>
  <div class="video-box">
    <video id="userView" autoplay playsinline></video>
    <div class="label">USER AUDIO+VIDEO</div>
    <div class="timestamp" id="time2"></div>
  </div>
</div>

<script>
/*... 480 lines JS: Dual PC setup, auto-reconnect, timestamp, no UI controls... */
class MonitorClient {
  constructor() {
    this.ws = null;
    this.hostPC = null;
    this.userPC = null;
    this.roomId = new URLSearchParams(location.search).get('room') || 'default';
    document.getElementById('room').textContent = this.roomId;
    this.startClock();
    this.connect();
  }

  connect() {
    this.ws = new WebSocket('wss://webrtsc-server.onrender.com';?room=${this.roomId}`);
    this.ws.onopen = () => {
      this.ws.send(JSON.stringify({type:'register', role:'monitor', id:'monitor'}));
      document.getElementById('status').textContent = 'Connected - Monitoring';
    };
    this.ws.onmessage = e => this.handleMsg(JSON.parse(e.data));
    this.ws.onclose = () => {
      document.getElementById('status').textContent = 'Disconnected - Retrying...';
      setTimeout(() => this.connect(), 3000);
    };
  }

  async handleMsg(data) {
    if (data.type === 'offer') {
      const isHost = data.from === 'host';
      const pc = new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});
      const videoEl = isHost? document.getElementById('hostView') : document.getElementById('userView');

      pc.ontrack = e => videoEl.srcObject = e.streams[0];
      pc.onicecandidate = e => {
        if (e.candidate) this.ws.send(JSON.stringify({to:data.from, type:'ice', candidate:e.candidate, from:'monitor'}));
      };

      if (isHost) this.hostPC = pc; else this.userPC = pc;

      await pc.setRemoteDescription(data.sdp);
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      this.ws.send(JSON.stringify({to:data.from, type:'answer', sdp:answer, to:data.from}));
    }

    if (data.type === 'ice') {
      const pc = data.from === 'host'? this.hostPC : this.userPC;
      if (pc) await pc.addIceCandidate(data.candidate);
    }
  }

  startClock() {
    setInterval(() => {
      const now = new Date().toLocaleTimeString();
      document.getElementById('time1').textContent = now;
      document.getElementById('time2').textContent = now;
    }, 1000);
  }
}

new MonitorClient();
</script>
</body>
</html>
