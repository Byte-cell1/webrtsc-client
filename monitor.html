<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor - WebRTC Meeting</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', sans-serif; }
body {
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
  min-height:100vh;
  color:#fff;
  padding:12px;
}
.header {
  background: rgba(255,255,255,0.05);
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  text-align:center;
}
h1 { font-size:20px; margin-bottom:5px; }
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
  gap:12px;
}
.video-box {
  background: rgba(255,255,255,0.05);
  border-radius:12px;
  padding:10px;
  border:1px solid rgba(255,255,255,0.1);
}
.video-box video {
  width:100%;
  height:180px;
  background:#000;
  border-radius:8px;
  object-fit:cover;
}
.name {
  text-align:center;
  margin-top:8px;
  font-size:14px;
  font-weight:600;
}
.status {
  text-align:center;
  padding:40px;
  font-size:16px;
  opacity:0.7;
}
</style>
</head>
<body>
<div class="header">
  <h1>📺 Monitor View</h1>
  <div>Room: <b id="roomId">public</b></div>
</div>

<div id="status" class="status">Waiting for streams...</div>
<div class="grid" id="videoGrid"></div>

<script>
const WS_URL = 'wss://webrtsc-server.onrender.com';
let ws, peers = {}, roomId;

const params = new URLSearchParams(window.location.search);
roomId = params.get('room') || 'public';
document.getElementById('roomId').textContent = roomId;

ws = new WebSocket(WS_URL);

ws.onopen = () => {
  ws.send(JSON.stringify({ type: 'join', role: 'monitor', roomId }));
};

ws.onmessage = (e) => {
  const data = JSON.parse(e.data);
  if(data.type === 'user-joined') createVideoBox(data.userId, data.name);
  if(data.type === 'offer') handleOffer(data);
  if(data.type === 'ice-candidate') handleIce(data);
  if(data.type === 'user-left') removeVideo(data.userId);
};

function createVideoBox(userId, name) {
  document.getElementById('status').style.display = 'none';
  const box = document.createElement('div');
  box.id = 'box-' + userId;
  box.className = 'video-box';
  box.innerHTML = `<video autoplay playsinline></video><div class="name">${name}</div>`;
  document.getElementById('videoGrid').appendChild(box);

  const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
  peers[userId] = pc;

  pc.ontrack = (e) => {
    box.querySelector('video').srcObject = e.streams[0];
  };

  pc.onicecandidate = (e) => {
    if(e.candidate) ws.send(JSON.stringify({ type: 'ice-candidate', target: data.from, candidate: e.candidate }));
  };
}

async function handleOffer(data) {
  const pc = peers[data.from];
  if(!pc) return;
  await pc.setRemoteDescription(data.offer);
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  ws.send(JSON.stringify({ type: 'answer', target: data.from, answer }));
}

async function handleIce(data) {
  const pc = peers[data.from];
  if(pc) await pc.addIceCandidate(data.candidate);
}

function removeVideo(userId) {
  document.getElementById('box-' + userId)?.remove();
  peers[userId]?.close();
  delete peers[userId];
}
</script>
</body>
</html>
