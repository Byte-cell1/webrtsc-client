<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor - All Cameras</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
  color:#fff;
  padding:14px;
  min-height:100vh;
}
h2 { margin-bottom:14px; }
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(300px, 1fr));
  gap:14px;
}
.box {
  background: rgba(255,255,255,0.08);
  border-radius:14px;
  padding:12px;
}
.box video {
  width:100%;
  height:220px;
  background:#000;
  border-radius:10px;
  object-fit:cover;
}
.name { text-align:center; margin-top:8px; font-weight:600; }
</style>
</head>
<body>
<h2>📺 Monitor - All Active Cameras</h2>
<div class="grid" id="grid"></div>

<script>
const WS_URL = 'wss://webrtsc-server-hb80.onrender.com';
const ws = new WebSocket(WS_URL);
const peers = {};

ws.onopen = () => ws.send(JSON.stringify({ type: 'join', role: 'monitor', roomId: 'all' }));

ws.onmessage = async (e) => {
  const data = JSON.parse(e.data);
  if (data.type === 'user-joined') createBox(data.userId, data.name);
  if (data.type === 'offer') handleOffer(data);
  if (data.type === 'ice' && peers[data.from]) await peers[data.from].addIceCandidate(data.candidate);
  if (data.type === 'user-left') {
    document.getElementById('box-' + data.userId)?.remove();
    peers[data.userId]?.close();
    delete peers[data.userId];
  }
};

function createBox(userId, name) {
  const div = document.createElement('div');
  div.id = 'box-' + userId;
  div.className = 'box';
  div.innerHTML = `<video autoplay playsinline></video><div class="name">${name}</div>`;
  document.getElementById('grid').appendChild(div);

  const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
  peers[userId] = pc;
  pc.ontrack = e => div.querySelector('video').srcObject = e.streams[0];
  pc.onicecandidate = e => e.candidate && ws.send(JSON.stringify({ type: 'ice', target: userId, candidate: e.candidate }));
}

async function handleOffer(data) {
  const pc = peers[data.from];
  if(!pc) return;
  await pc.setRemoteDescription(data.offer);
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  ws.send(JSON.stringify({ type: 'answer', target: data.from, answer }));
}
</script>
</body>
</html>
