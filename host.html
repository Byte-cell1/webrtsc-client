<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Host Control Center</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
body {
  background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
  min-height:100vh;
  color:#fff;
  padding:12px;
}
.header {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  padding:14px;
  border-radius:16px;
  margin-bottom:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:8px;
  box-shadow:0 4px 20px rgba(0,0,0,0.3);
}
h1 { font-size:18px; font-weight:700; }
.btn {
  padding:10px 14px;
  border:none;
  border-radius:10px;
  background:#fff;
  color:#1e3c72;
  font-weight:700;
  cursor:pointer;
  font-size:13px;
  transition:0.2s;
}
.btn:hover { transform:scale(1.05); }
.btn.menu { background:#f59e0b; color:#fff; }
.btn.uid { background:#10b981; color:#fff; }
.btn.group { background:#8b5cf6; color:#fff; }
.container {
  display:grid;
  grid-template-columns:1fr;
  gap:14px;
}
@media(min-width:900px) {
.container { grid-template-columns:2.2fr 1fr; }
}
.video-section {
  background: rgba(255,255,255,0.08);
  border-radius:16px;
  padding:14px;
  overflow-y:auto;
  max-height:92vh;
}
.video-section video {
  width:100%;
  border-radius:12px;
  background:#000;
}
.users-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(200px, 1fr));
  gap:12px;
  margin-top:14px;
}
.user-box {
  background: rgba(0,0,0,0.3);
  border-radius:12px;
  padding:10px;
  position:relative;
}
.user-box video {
  width:100%;
  height:160px;
  background:#000;
  border-radius:10px;
  object-fit:cover;
}
.user-name {
  font-size:13px;
  margin-top:6px;
  text-align:center;
  font-weight:600;
}
.users-panel {
  background: rgba(255,255,255,0.08);
  border-radius:16px;
  padding:14px;
  max-height:92vh;
  display:flex;
  flex-direction:column;
}
.users-panel.hidden { display:none; }
.users-list,.group-list {
  flex:0 0 auto;
  max-height:160px;
  overflow-y:auto;
  margin:8px 0;
}
.user-item,.group-item {
  padding:10px;
  background: rgba(255,255,255,0.06);
  border-radius:10px;
  margin-bottom:6px;
}
.user-actions button {
  padding:6px 10px;
  font-size:12px;
  margin:3px 2px 0 0;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
.add { background:#10b981; color:#fff; }
.reject { background:#ef4444; color:#fff; }
.chat-container {
  flex:1;
  display:flex;
  flex-direction:column;
  background: rgba(0,0,0,0.25);
  border-radius:12px;
  overflow:hidden;
  margin-top:10px;
}
.chat-log {
  flex:1;
  overflow-y:auto;
  padding:12px;
  font-size:14px;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.chat-bubble {
  max-width:78%;
  padding:10px 14px;
  border-radius:14px;
  line-height:1.4;
}
.chat-bubble.me {
  background:#075e54;
  align-self:flex-end;
}
.chat-bubble.other {
  background: rgba(255,255,255,0.12);
  align-self:flex-start;
}
.img-msg { max-width:220px; border-radius:10px; margin-top:6px; }
.audio-msg { width:220px; margin-top:6px; }
.chat-input-area {
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px;
  background: rgba(0,0,0,0.35);
}
.chat-input-area input {
  flex:1;
  padding:12px;
  border-radius:22px;
  border:none;
  background: rgba(255,255,255,0.1);
  color:#fff;
  outline:none;
}
.icon-btn {
  width:42px;
  height:42px;
  border-radius:50%;
  border:none;
  background:#25d366;
  color:#fff;
  font-size:19px;
  cursor:pointer;
}
</style>
</head>
<body>
<div class="header">
  <h1>🎥 Host Control Center</h1>
  <button class="btn uid" id="genUidBtn">🔑 New Room</button>
  <button class="btn group" id="groupBtn">👥 Group</button>
  <button class="btn menu" id="menuBtn">☰ Users</button>
</div>

<div class="container">
  <div class="video-section">
    <video id="localVideo" autoplay muted playsinline></video>
    <h3 style="margin-top:16px;">Live Users</h3>
    <div class="users-grid" id="usersGrid"></div>
  </div>

  <div class="users-panel hidden" id="usersPanel">
    <h3>All Users</h3>
    <div class="users-list" id="usersList"></div>

    <h3 style="margin-top:12px;">Groups</h3>
    <div class="group-list" id="groupList"></div>
    <button class="btn" onclick="createGroup()" style="width:100%;margin-top:6px">+ Create Group</button>

    <h3 style="margin-top:12px;">Chat</h3>
    <div class="chat-container">
      <div class="chat-log" id="chatLog"></div>
      <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="Type message">
        <input type="file" id="fileInput" accept="image/*,audio/*,.pdf,.doc,.txt" style="display:none">
        <button class="icon-btn" onclick="document.getElementById('fileInput').click()">📎</button>
        <button class="icon-btn" id="voiceBtn">🎤</button>
        <button class="icon-btn" id="sendBtn" style="background:#128c7e;">⌨️</button>
      </div>
    </div>
  </div>
</div>

<script>
const WS_URL = 'wss://webrtsc-server-hb80.onrender.com';
let ws, localStream, peers = {}, roomId = 'public', selectedTarget = null, allUsers = {}, groups = {};

async function init() {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    document.getElementById('localVideo').srcObject = localStream;
    connectWS();
  } catch(e) {
    alert('Allow camera + mic permission');
  }
}

function connectWS() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => ws.send(JSON.stringify({ type: 'join', role: 'host', roomId }));
  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if(data.type === 'user-joined') addUser(data.userId, data.name);
    if(data.type === 'offer') handleOffer(data);
    if(data.type === 'chat') showChat(data.from, data.msg);
    if(data.type === 'file') showFile(data.from, data.fileName, data.fileData);
  };
}

function addUser(userId, name) {
  allUsers[userId] = name;
  const div = document.createElement('div');
  div.id = 'user-item-' + userId;
  div.className = 'user-item';
  div.innerHTML = `
    <div>${name}</div>
    <div class="user-actions">
      <button class="add" onclick="approve('${userId}')">Approve</button>
      <button class="reject" onclick="reject('${userId}')">Remove</button>
      <button class="add" onclick="chatWith('${userId}')">DM</button>
    </div>
  `;
  document.getElementById('usersList').appendChild(div);
}

function approve(userId) {
  const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
  peers[userId] = pc;
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  pc.ontrack = e => {
    const box = document.createElement('div');
    box.id = 'video-' + userId;
    box.className = 'user-box';
    box.innerHTML = `<video autoplay playsinline></video><div class="user-name">${allUsers[userId]}</div>`;
    document.getElementById('usersGrid').appendChild(box);
    box.querySelector('video').srcObject = e.streams[0];
  };
  pc.onicecandidate = e => e.candidate && ws.send(JSON.stringify({ type: 'ice', target: userId, candidate: e.candidate }));
  ws.send(JSON.stringify({ type: 'approve', target: userId }));
}

function reject(userId) {
  peers[userId]?.close();
  document.getElementById('video-' + userId)?.remove();
  ws.send(JSON.stringify({ type: 'reject', target: userId }));
}

function createGroup() {
  const name = prompt('Group name:');
  if(!name) return;
  const groupId = 'g_' + Date.now();
  groups[groupId] = { name, members: [] };
  const div = document.createElement('div');
  div.className = 'group-item';
  div.textContent = name;
  div.onclick = () => chatWith(groupId);
  document.getElementById('groupList').appendChild(div);
}

function chatWith(target) {
  selectedTarget = target;
  document.getElementById('chatLog').innerHTML = `<div style="text-align:center;opacity:0.7">Chatting with ${groups[target]?.name || allUsers[target]}</div>`;
}

function showChat(from, msg) {
  const div = document.createElement('div');
  div.className = 'chat-bubble other';
  div.innerHTML = `<b>${allUsers[from] || 'User'}:</b> ${msg}`;
  document.getElementById('chatLog').appendChild(div);
  document.getElementById('chatLog').scrollTop = 99999;
}

function showFile(from, fileName, fileData) {
  const div = document.createElement('div');
  div.className = 'chat-bubble other';
  if(fileName.match(/\.(jpg|jpeg|png|gif)$/i)) {
    div.innerHTML = `<b>${allUsers[from]}:</b><br><img class="img-msg" src="${fileData}">`;
  } else if(fileName.match(/\.(mp3|wav|webm)$/i)) {
    div.innerHTML = `<b>${allUsers[from]}:</b><br><audio class="audio-msg" controls src="${fileData}"></audio>`;
  } else {
    div.innerHTML = `<b>${allUsers[from]}:</b> <a href="${fileData}" download="${fileName}" style="color:#4ade80">${fileName}</a>`;
  }
  document.getElementById('chatLog').appendChild(div);
}

document.getElementById('sendBtn').onclick = () => {
  const msg = document.getElementById('chatInput').value.trim();
  if(msg && selectedTarget && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'chat', target: selectedTarget, msg }));
    const div = document.createElement('div');
    div.className = 'chat-bubble me';
    div.textContent = 'You: ' + msg;
    document.getElementById('chatLog').appendChild(div);
    document.getElementById('chatInput').value = '';
  }
};

document.getElementById('fileInput').onchange = (e) => {
  const file = e.target.files[0];
  if(!file ||!selectedTarget) return;
  const reader = new FileReader();
  reader.onload = () => {
    ws.send(JSON.stringify({ type: 'file', target: selectedTarget, fileName: file.name, fileData: reader.result }));
    showFile('You', file.name, reader.result);
  };
  reader.readAsDataURL(file);
};

let recorder, chunks = [];
document.getElementById('voiceBtn').onmousedown = async () => {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  recorder = new MediaRecorder(stream);
  recorder.ondataavailable = e => chunks.push(e.data);
  recorder.onstop = () => {
    const blob = new Blob(chunks, { type: 'audio/webm' });
    const reader = new FileReader();
    reader.onload = () => {
      ws.send(JSON.stringify({ type: 'file', target: selectedTarget, fileName: 'voice.webm', fileData: reader.result }));
      showFile('You', 'voice.webm', reader.result);
    };
    reader.readAsDataURL(blob);
    chunks = [];
  };
  recorder.start();
  document.getElementById('voiceBtn').style.background = '#ef4444';
};
document.getElementById('voiceBtn').onmouseup = () => {
  recorder?.stop();
  document.getElementById('voiceBtn').style.background = '#25d366';
};

document.getElementById('menuBtn').onclick = () =>
  document.getElementById('usersPanel').classList.toggle('hidden');

document.getElementById('genUidBtn').onclick = () => {
  roomId = Math.random().toString(36).substring(2,8).toUpperCase();
  alert('Room Code: ' + roomId);
};

init();
</script>
</body>
</html>
