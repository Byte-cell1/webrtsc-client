<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Host Control</title>
<style>
/*... keep all previous CSS... */
.group-list {
  margin-top:10px;
  max-height:150px;
  overflow-y:auto;
}
.group-item {
  padding:8px;
  background: rgba(255,255,255,0.1);
  border-radius:8px;
  margin-bottom:5px;
  cursor:pointer;
}
.img-msg { max-width:200px; border-radius:8px; margin-top:5px; }
.audio-msg { width:200px; margin-top:5px; }
</style>
</head>
<body>
<div class="header">
  <h1>🎥 Host Control Center</h1>
  <button class="btn uid" id="genUidBtn">🔑 New Room</button>
  <button class="btn menu" id="menuBtn">☰ Users</button>
  <button class="btn" id="groupBtn" style="background:#8b5cf6;color:#fff">👥 Group</button>
</div>

<div class="container">
  <div class="video-section">
    <video id="localVideo" autoplay muted playsinline></video>
    <h3 style="margin-top:15px;">Live Users</h3>
    <div class="users-grid" id="usersGrid"></div>
  </div>

  <div class="users-panel hidden" id="usersPanel">
    <h3>All Users</h3>
    <div class="users-list" id="usersList"></div>

    <h3 style="margin-top:12px;">Groups</h3>
    <div class="group-list" id="groupList"></div>
    <button class="btn" onclick="createGroup()" style="width:100%;margin-top:5px">+ Create Group</button>

    <h3 style="margin-top:12px;">Chat</h3>
    <div class="chat-container">
      <div class="chat-log" id="chatLog"></div>
      <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="Type message">
        <input type="file" id="fileInput" accept="image/*,audio/*,.pdf,.doc" style="display:none">
        <button class="icon-btn" onclick="document.getElementById('fileInput').click()">📎</button>
        <button class="icon-btn" id="voiceBtn">🎤</button>
        <button class="icon-btn" id="sendBtn" style="background:#128c7e;">⌨️</button>
      </div>
    </div>
  </div>
</div>

<script>
const WS_URL = 'wss://webrtsc-server-hb80.onrender.com';
let ws, localStream, peers = {}, roomId = 'public', selectedTarget = null, allUsers = {}, groups = {};

async function init() {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    document.getElementById('localVideo').srcObject = localStream;
    connectWS();
  } catch(e) {
    alert('Allow camera + mic permission');
  }
}

function connectWS() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => ws.send(JSON.stringify({ type: 'join', role: 'host', roomId }));
  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if(data.type === 'user-joined') addUser(data.userId, data.name);
    if(data.type === 'offer') handleOffer(data);
    if(data.type === 'chat') showChat(data.from, data.msg, data.target);
    if(data.type === 'file') showFile(data.from, data.fileName, data.fileData);
  };
}

function addUser(userId, name) {
  allUsers[userId] = name;
  const div = document.createElement('div');
  div.id = 'user-item-' + userId;
  div.className = 'user-item';
  div.innerHTML = `
    <div>${name}</div>
    <div class="user-actions">
      <button class="add" onclick="approve('${userId}')">Approve</button>
      <button class="reject" onclick="reject('${userId}')">Remove</button>
      <button class="add" onclick="chatWith('${userId}')">DM</button>
    </div>
  `;
  document.getElementById('usersList').appendChild(div);
}

function createGroup() {
  const name = prompt('Enter group name:');
  if(!name) return;
  const groupId = 'g_' + Date.now();
  groups[groupId] = { name, members: [] };
  const div = document.createElement('div');
  div.className = 'group-item';
  div.textContent = name;
  div.onclick = () => chatWith(groupId);
  document.getElementById('groupList').appendChild(div);
  alert('Group created. Click user "Add to Group" to add members');
}

function chatWith(target) {
  selectedTarget = target;
  document.getElementById('chatLog').innerHTML = `<div style="text-align:center;opacity:0.7">Chatting with ${groups[target]?.name || allUsers[target]}</div>`;
}

function showChat(from, msg, target) {
  const div = document.createElement('div');
  div.className = 'chat-bubble other';
  div.innerHTML = `<b>${allUsers[from] || 'User'}:</b> ${msg}`;
  document.getElementById('chatLog').appendChild(div);
  document.getElementById('chatLog').scrollTop = 99999;
}

function showFile(from, fileName, fileData) {
  const div = document.createElement('div');
  div.className = 'chat-bubble other';
  if(fileName.match(/\.(jpg|jpeg|png|gif)$/i)) {
    div.innerHTML = `<b>${allUsers[from]}:</b><br><img class="img-msg" src="${fileData}">`;
  } else if(fileName.match(/\.(mp3|wav|webm)$/i)) {
    div.innerHTML = `<b>${allUsers[from]}:</b><br><audio class="audio-msg" controls src="${fileData}"></audio>`;
  } else {
    div.innerHTML = `<b>${allUsers[from]}:</b> <a href="${fileData}" download="${fileName}" style="color:#4ade80">${fileName}</a>`;
  }
  document.getElementById('chatLog').appendChild(div);
}

document.getElementById('sendBtn').onclick = () => {
  const msg = document.getElementById('chatInput').value.trim();
  if(msg && selectedTarget && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'chat', target: selectedTarget, msg }));
    const div = document.createElement('div');
    div.className = 'chat-bubble me';
    div.textContent = 'You: ' + msg;
    document.getElementById('chatLog').appendChild(div);
    document.getElementById('chatInput').value = '';
  }
};

document.getElementById('fileInput').onchange = (e) => {
  const file = e.target.files[0];
  if(!file ||!selectedTarget) return;
  const reader = new FileReader();
  reader.onload = () => {
    ws.send(JSON.stringify({ type: 'file', target: selectedTarget, fileName: file.name, fileData: reader.result }));
    showFile('You', file.name, reader.result);
  };
  reader.readAsDataURL(file);
};

let recorder, chunks = [];
document.getElementById('voiceBtn').onmousedown = async () => {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  recorder = new MediaRecorder(stream);
  recorder.ondataavailable = e => chunks.push(e.data);
  recorder.onstop = () => {
    const blob = new Blob(chunks, { type: 'audio/webm' });
    const reader = new FileReader();
    reader.onload = () => {
      ws.send(JSON.stringify({ type: 'file', target: selectedTarget, fileName: 'voice.webm', fileData: reader.result }));
      showFile('You', 'voice.webm', reader.result);
    };
    reader.readAsDataURL(blob);
    chunks = [];
  };
  recorder.start();
  document.getElementById('voiceBtn').style.background = '#ef4444';
};
document.getElementById('voiceBtn').onmouseup = () => {
  recorder?.stop();
  document.getElementById('voiceBtn').style.background = '#25d366';
};

document.getElementById('menuBtn').onclick = () =>
  document.getElementById('usersPanel').classList.toggle('hidden');

document.getElementById('genUidBtn').onclick = () => {
  roomId = Math.random().toString(36).substring(2,8).toUpperCase();
  alert('Room Code: ' + roomId);
};

init();
</script>
</body>
</html>
