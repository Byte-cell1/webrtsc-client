<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Host - WebRTC Meeting</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', sans-serif; }
body {
  background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
  min-height:100vh;
  color:#fff;
  padding:10px;
}
.header {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  padding:12px;
  border-radius:15px;
  margin-bottom:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:8px;
}
h1 { font-size:17px; }
.status { display:flex; gap:8px; align-items:center; font-size:12px; flex-wrap:wrap; }
.dot { width:10px; height:10px; border-radius:50%; background:#666; }
.dot.green { background:#4ade80; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
.btn {
  padding:9px 12px;
  border:none;
  border-radius:8px;
  background:#fff;
  color:#1e3c72;
  font-weight:700;
  cursor:pointer;
  font-size:12px;
  transition:0.2s;
}
.btn:hover { transform:scale(1.05); }
.btn.menu { background:#f59e0b; color:#fff; }
.btn.uid { background:#10b981; color:#fff; }
.btn.small { padding:5px 8px; font-size:11px; margin:2px; }
.btn.add { background:#10b981; color:#fff; }
.btn.reject { background:#ef4444; color:#fff; }
.btn.remove { background:#f59e0b; color:#fff; }
.container {
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
}
@media(min-width:768px) {
.container { grid-template-columns:2fr 1fr; }
}
.video-section {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border-radius:15px;
  padding:12px;
  border:1px solid rgba(255,255,255,0.1);
}
#localVideo {
  width:100%;
  max-height:40vh;
  background:#000;
  border-radius:10px;
}
.users-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(130px, 1fr));
  gap:8px;
  margin-top:12px;
}
.user-box {
  background: rgba(0,0,0,0.3);
  border-radius:10px;
  padding:6px;
}
.user-box video {
  width:100%;
  height:100px;
  background:#000;
  border-radius:8px;
  object-fit:cover;
}
.user-name {
  font-size:11px;
  margin-top:4px;
  text-align:center;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.users-panel {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border-radius:15px;
  padding:12px;
  border:1px solid rgba(255,255,255,0.1);
  max-height:85vh;
  display:flex;
  flex-direction:column;
}
.users-panel.hidden { display:none; }
.users-list {
  flex:1;
  overflow-y:auto;
  margin:8px 0;
}
.user-item {
  padding:8px;
  background: rgba(255,255,255,0.05);
  border-radius:8px;
  margin-bottom:6px;
  font-size:13px;
}
.chat-container {
  display:flex;
  flex-direction:column;
  height:250px;
  background: rgba(0,0,0,0.2);
  border-radius:10px;
  overflow:hidden;
}
.chat-log {
  flex:1;
  overflow-y:auto;
  padding:10px;
  font-size:13px;
  display:flex;
  flex-direction:column;
  gap:6px;
}
.chat-bubble {
  max-width:75%;
  padding:8px 12px;
  border-radius:12px;
  word-wrap:break-word;
}
.chat-bubble.me {
  background:#075e54;
  align-self:flex-end;
  border-bottom-right-radius:4px;
}
.chat-bubble.other {
  background: rgba(255,255,255,0.15);
  align-self:flex-start;
  border-bottom-left-radius:4px;
}
.chat-input-area {
  display:flex;
  align-items:center;
  gap:6px;
  padding:8px;
  background: rgba(0,0,0,0.3);
}
.chat-input-area input {
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
  background: rgba(255,255,255,0.1);
  color:#fff;
  font-size:14px;
}
.icon-btn {
  width:40px;
  height:40px;
  border-radius:50%;
  border:none;
  background:#25d366;
  color:#fff;
  font-size:18px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}
.icon-btn:active { transform:scale(0.9); }
.log-box {
  background: rgba(0,0,0,0.3);
  border-radius:8px;
  padding:8px;
  font-size:11px;
  height:80px;
  overflow-y:auto;
  margin-top:8px;
}
.uid-display {
  background: rgba(16,185,129,0.2);
  padding:6px 10px;
  border-radius:8px;
  font-weight:700;
  font-size:14px;
  letter-spacing:1px;
}
</style>
</head>
<body>
<div class="header">
  <h1>🎥 Host Dashboard</h1>
  <div class="status">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">Initializing...</span>
    <span>Room: <span class="uid-display" id="roomId">public</span></span>
  </div>
  <button class="btn uid" id="genUidBtn">🔑 New UID</button>
  <button class="btn menu" id="menuBtn">☰ Menu</button>
</div>

<div class="container">
  <div class="video-section">
    <video id="localVideo" autoplay muted playsinline></video>
    <div class="users-grid" id="usersGrid"></div>
    <div class="log-box" id="logBox"></div>
  </div>

  <div class="users-panel hidden" id="usersPanel">
    <h3>All Users</h3>
    <div class="users-list" id="usersList"></div>

    <h3 style="margin-top:12px;">Chat</h3>
    <div class="chat-container">
      <div class="chat-log" id="chatLog"></div>
      <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="Type a message">
        <button class="icon-btn" id="voiceBtn">🎤</button>
        <button class="icon-btn" id="sendBtn" style="background:#128c7e;">⌨️</button>
      </div>
    </div>
  </div>
</div>

<script>
const WS_URL = 'wss://webrtsc-server.onrender.com';
let ws, localStream, peers = {}, roomId = 'public', allUsers = {};

function log(msg) {
  const box = document.getElementById('logBox');
  box.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
  box.scrollTop = box.scrollHeight;
}

function updateStatus(text, color) {
  document.getElementById('statusText').textContent = text;
  document.getElementById('statusDot').className = 'dot ' + color;
}

function generateUID() {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  let uid = '';
  for(let i = 0; i < 6; i++) uid += chars.charAt(Math.floor(Math.random() * chars.length));
  return uid;
}

async function init() {
  const params = new URLSearchParams(window.location.search);
  roomId = params.get('room') || 'public';
  document.getElementById('roomId').textContent = roomId;

  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    document.getElementById('localVideo').srcObject = localStream;
    updateStatus('Media ready', 'green');
    log('Camera + mic access granted');
    connectWS();
    loadChat();
  } catch(e) {
    updateStatus('Camera error', 'red');
    log('Error: ' + e.message);
    alert('Allow camera + mic permission then refresh');
  }
}

function connectWS() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    log('WebSocket connected');
    ws.send(JSON.stringify({ type: 'join', role: 'host', roomId }));
    updateStatus('Connected', 'green');
  };

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if(data.type === 'user-joined') handleUserJoined(data);
    if(data.type === 'offer') handleOffer(data);
    if(data.type === 'answer') handleAnswer(data);
    if(data.type === 'ice-candidate') handleIce(data);
    if(data.type === 'user-left') removeUser(data.userId);
    if(data.type === 'chat') receiveChat(data);
    if(data.type === 'voice') receiveVoice(data);
  };

  ws.onclose = () => {
    updateStatus('Disconnected', 'red');
    log('WebSocket closed');
  };
}

function handleUserJoined(data) {
  allUsers[data.userId] = { name: data.name, room: data.roomId, status: 'pending' };
  addUserToList(data.userId, data.name, data.roomId);
  log(data.name + ' joined room ' + data.roomId);
  saveUsers();
}

function addUserToList(userId, name, userRoom) {
  const div = document.createElement('div');
  div.id = 'list-' + userId;
  div.className = 'user-item';
  div.innerHTML = `
    <div>${name} <small>[${userRoom}]</small></div>
    <div>
      <button class="btn small add" onclick="approveUser('${userId}')">Add</button>
      <button class="btn small reject" onclick="rejectUser('${userId}')">Reject</button>
      <button class="btn small remove" onclick="removeUser('${userId}')">Remove</button>
      <button class="btn small add" onclick="restoreUser('${userId}')">Restore</button>
    </div>
  `;
  document.getElementById('usersList').appendChild(div);
}

function approveUser(userId) {
  allUsers[userId].status = 'approved';
  createPeer(userId);
  ws.send(JSON.stringify({ type: 'approve', target: userId }));
  log(allUsers[userId].name + ' approved');
}

function rejectUser(userId) {
  allUsers[userId].status = 'rejected';
  ws.send(JSON.stringify({ type: 'reject', target: userId }));
  log(allUsers[userId].name + ' rejected');
}

function createPeer(userId) {
  if(peers[userId]) return;
  const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
  peers[userId] = { pc, name: allUsers[userId].name };

  localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

  pc.ontrack = (e) => {
    let box = document.getElementById('user-' + userId);
    if(!box) {
      box = document.createElement('div');
      box.id = 'user-' + userId;
      box.className = 'user-box';
      box.innerHTML = `<video autoplay playsinline></video><div class="user-name">${allUsers[userId].name}</div>`;
      document.getElementById('usersGrid').appendChild(box);
    }
    box.querySelector('video').srcObject = e.streams[0];
  };

  pc.onicecandidate = (e) => {
    if(e.candidate) ws.send(JSON.stringify({ type: 'ice-candidate', target: userId, candidate: e.candidate }));
  };
}

async function handleOffer(data) {
  const peer = peers[data.from];
  if(!peer) return;
  await peer.pc.setRemoteDescription(data.offer);
  const answer = await peer.pc.createAnswer();
  await peer.pc.setLocalDescription(answer);
  ws.send(JSON.stringify({ type: 'answer', target: data.from, answer }));
}

async function handleAnswer(data) {
  const peer = peers[data.from];
  if(peer) await peer.pc.setRemoteDescription(data.answer);
}

async function handleIce(data) {
  const peer = peers[data.from];
  if(peer) await peer.pc.addIceCandidate(data.candidate);
}

function removeUser(userId) {
  if(peers[userId]) {
    peers[userId].pc.close();
    delete peers[userId];
  }
  document.getElementById('user-' + userId)?.remove();
  if(allUsers[userId]) allUsers[userId].status = 'removed';
  log('User removed');
}

function restoreUser(userId) {
  if(allUsers[userId]) {
    allUsers[userId].status = 'approved';
    createPeer(userId);
    ws.send(JSON.stringify({ type: 'approve', target: userId }));
    log(allUsers[userId].name + ' restored');
  }
}

function receiveChat(data) {
  addChatBubble(data.name, data.msg, 'other');
  saveChat(data.name, data.msg, 'other');
}

function receiveVoice(data) {
  addChatBubble(data.name, '🎤 Voice note', 'other');
  saveChat(data.name, '[Voice]', 'other');
}

function addChatBubble(name, msg, type) {
  const div = document.createElement('div');
  div.className = 'chat-bubble ' + type;
  div.innerHTML = `<b>${name}:</b> ${msg}`;
  document.getElementById('chatLog').appendChild(div);
  document.getElementById('chatLog').scrollTop = 99999;
}

function saveChat(name, msg, type) {
  const chats = JSON.parse(localStorage.getItem('hostChat') || '[]');
  chats.push({ name, msg, type, time: Date.now() });
  localStorage.setItem('hostChat', JSON.stringify(chats));
}

function loadChat() {
  const chats = JSON.parse(localStorage.getItem('hostChat') || '[]');
  chats.forEach(c => addChatBubble(c.name, c.msg, c.type));
}

function saveUsers() {
  localStorage.setItem('allUsers', JSON.stringify(allUsers));
}

// Button events
document.getElementById('menuBtn').addEventListener('click', () => {
  document.getElementById('usersPanel').classList.toggle('hidden');
});

document.getElementById('genUidBtn').addEventListener('click', () => {
  const newUid = generateUID();
  roomId = newUid;
  document.getElementById('roomId').textContent = newUid;
  ws.send(JSON.stringify({ type: 'change-room', newRoomId: newUid }));
  log('New Room UID: ' + newUid);
  alert('Room UID: ' + newUid);
});

document.getElementById('sendBtn').addEventListener('click', sendChat);
document.getElementById('chatInput').addEventListener('keypress', (e) => {
  if(e.key === 'Enter') sendChat();
});

function sendChat() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if(msg && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'chat', roomId, msg, name: 'Host' }));
    addChatBubble('Host', msg, 'me');
    saveChat('Host', msg, 'me');
    input.value = '';
  }
}

let mediaRecorder, audioChunks = [];
document.getElementById('voiceBtn').addEventListener('click', async () => {
  if(!mediaRecorder || mediaRecorder.state === 'inactive') {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = () => {
      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      audioChunks = [];
      ws.send(JSON.stringify({ type: 'voice', roomId, name: 'Host' }));
      addChatBubble('Host', '🎤 Voice note', 'me');
      saveChat('Host', '[Voice]', 'me');
      stream.getTracks().forEach(t => t.stop());
    };
    mediaRecorder.start();
    document.getElementById('voiceBtn').style.background = '#ef4444';
  } else {
    mediaRecorder.stop();
    document.getElementById('voiceBtn').style.background = '#25d366';
  }
});

init();
</script>
</body>
</html>
