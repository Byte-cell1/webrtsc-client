<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Host - WebRTC Meeting</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', sans-serif; }
body {
  background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
  min-height:100vh;
  color:#fff;
  padding:10px;
}
.header {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:10px;
}
h1 { font-size:18px; }
.status { display:flex; gap:8px; align-items:center; font-size:13px; flex-wrap:wrap; }
.dot { width:10px; height:10px; border-radius:50%; background:#666; }
.dot.green { background:#4ade80; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
.btn {
  padding:10px 14px;
  border:none;
  border-radius:8px;
  background:#fff;
  color:#1e3c72;
  font-weight:700;
  cursor:pointer;
  font-size:13px;
  transition:0.2s;
}
.btn:hover { transform:scale(1.05); }
.btn.menu { background:#f59e0b; color:#fff; }
.btn.uid { background:#10b981; color:#fff; }
.container {
  display:grid;
  grid-template-columns:1fr;
  gap:15px;
}
@media(min-width:768px) {
.container { grid-template-columns:2fr 1fr; }
}
.video-section {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border-radius:15px;
  padding:15px;
  border:1px solid rgba(255,255,255,0.1);
}
#localVideo {
  width:100%;
  max-height:45vh;
  background:#000;
  border-radius:10px;
}
.users-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(140px, 1fr));
  gap:10px;
  margin-top:15px;
}
.user-box {
  background: rgba(0,0,0,0.3);
  border-radius:10px;
  padding:8px;
}
.user-box video {
  width:100%;
  height:110px;
  background:#000;
  border-radius:8px;
  object-fit:cover;
}
.user-name {
  font-size:12px;
  margin-top:5px;
  text-align:center;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.users-panel {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border-radius:15px;
  padding:15px;
  border:1px solid rgba(255,255,255,0.1);
  max-height:85vh;
  display:flex;
  flex-direction:column;
}
.users-panel.hidden { display:none; }
.users-list {
  flex:1;
  overflow-y:auto;
  margin:10px 0;
}
.user-item {
  padding:10px;
  background: rgba(255,255,255,0.05);
  border-radius:8px;
  margin-bottom:8px;
  font-size:14px;
}
.chat-log {
  height:180px;
  overflow-y:auto;
  background: rgba(0,0,0,0.2);
  border-radius:8px;
  padding:10px;
  font-size:13px;
  margin:10px 0;
}
.chat-msg { margin-bottom:6px; word-wrap:break-word; }
.chat-box {
  display:flex;
  gap:8px;
}
.chat-box input {
  flex:1;
  padding:10px;
  border-radius:8px;
  border:1px solid rgba(255,255,255,0.2);
  background: rgba(0,0,0,0.2);
  color:#fff;
  font-size:14px;
}
.log-box {
  background: rgba(0,0,0,0.3);
  border-radius:8px;
  padding:10px;
  font-size:12px;
  height:90px;
  overflow-y:auto;
  margin-top:10px;
}
.uid-display {
  background: rgba(16,185,129,0.2);
  padding:8px 12px;
  border-radius:8px;
  font-weight:700;
  font-size:16px;
  letter-spacing:2px;
}
</style>
</head>
<body>
<div class="header">
  <h1>🎥 Host Dashboard</h1>
  <div class="status">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">Initializing...</span>
    <span>Room: <span class="uid-display" id="roomId">public</span></span>
  </div>
  <button class="btn uid" id="genUidBtn">🔑 Generate UID</button>
  <button class="btn menu" id="menuBtn">👥 Users</button>
</div>

<div class="container">
  <div class="video-section">
    <video id="localVideo" autoplay muted playsinline></video>
    <div class="users-grid" id="usersGrid"></div>
    <div class="log-box" id="logBox"></div>
  </div>

  <div class="users-panel hidden" id="usersPanel">
    <h3>Connected Users</h3>
    <div class="users-list" id="usersList"></div>

    <h3 style="margin-top:15px;">Chat</h3>
    <div class="chat-log" id="chatLog"></div>
    <div class="chat-box">
      <input type="text" id="chatInput" placeholder="Type message...">
      <button class="btn" id="sendBtn">Send</button>
    </div>
  </div>
</div>

<script>
const WS_URL = 'wss://webrtsc-server.onrender.com';
let ws, localStream, peers = {}, roomId = 'public';

function log(msg) {
  const box = document.getElementById('logBox');
  box.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
  box.scrollTop = box.scrollHeight;
}

function updateStatus(text, color) {
  document.getElementById('statusText').textContent = text;
  document.getElementById('statusDot').className = 'dot ' + color;
}

function generateUID() {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  let uid = '';
  for(let i = 0; i < 6; i++) uid += chars.charAt(Math.floor(Math.random() * chars.length));
  return uid;
}

async function init() {
  const params = new URLSearchParams(window.location.search);
  roomId = params.get('room') || 'public';
  document.getElementById('roomId').textContent = roomId;

  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    document.getElementById('localVideo').srcObject = localStream;
    updateStatus('Media ready', 'green');
    log('Camera + mic access granted');
    connectWS();
  } catch(e) {
    updateStatus('Camera error', 'red');
    log('Error: ' + e.message);
    alert('Allow camera + mic permission then refresh');
  }
}

function connectWS() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    log('WebSocket connected to server');
    ws.send(JSON.stringify({ type: 'join', role: 'host', roomId }));
    updateStatus('Connected', 'green');
  };

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if(data.type === 'user-joined') addUser(data.userId, data.name);
    if(data.type === 'offer') handleOffer(data);
    if(data.type === 'answer') handleAnswer(data);
    if(data.type === 'ice-candidate') handleIce(data);
    if(data.type === 'user-left') removeUser(data.userId);
    if(data.type === 'chat') addChatMsg(data.name, data.msg);
  };

  ws.onclose = () => {
    updateStatus('Disconnected', 'red');
    log('WebSocket closed');
  };
}

function addUser(userId, name) {
  if(peers[userId]) return;

  const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
  peers[userId] = { pc, name };

  localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

  pc.ontrack = (e) => {
    let box = document.getElementById('user-' + userId);
    if(!box) {
      box = document.createElement('div');
      box.id = 'user-' + userId;
      box.className = 'user-box';
      box.innerHTML = `<video autoplay playsinline></video><div class="user-name">${name}</div>`;
      document.getElementById('usersGrid').appendChild(box);
    }
    box.querySelector('video').srcObject = e.streams[0];
  };

  pc.onicecandidate = (e) => {
    if(e.candidate) ws.send(JSON.stringify({ type: 'ice-candidate', target: userId, candidate: e.candidate }));
  };

  addUserToList(userId, name);
  log(name + ' joined room ' + roomId);
}

function addUserToList(userId, name) {
  const div = document.createElement('div');
  div.id = 'list-' + userId;
  div.className = 'user-item';
  div.textContent = '🎤 ' + name;
  document.getElementById('usersList').appendChild(div);
}

function removeUser(userId) {
  if(peers[userId]) {
    peers[userId].pc.close();
    delete peers[userId];
  }
  document.getElementById('user-' + userId)?.remove();
  document.getElementById('list-' + userId)?.remove();
  log('User left');
}

async function handleOffer(data) {
  const peer = peers[data.from];
  if(!peer) return;
  await peer.pc.setRemoteDescription(data.offer);
  const answer = await peer.pc.createAnswer();
  await peer.pc.setLocalDescription(answer);
  ws.send(JSON.stringify({ type: 'answer', target: data.from, answer }));
}

async function handleAnswer(data) {
  const peer = peers[data.from];
  if(peer) await peer.pc.setRemoteDescription(data.answer);
}

async function handleIce(data) {
  const peer = peers[data.from];
  if(peer) await peer.pc.addIceCandidate(data.candidate);
}

function addChatMsg(name, msg) {
  const div = document.createElement('div');
  div.className = 'chat-msg';
  div.innerHTML = `<b>${name}:</b> ${msg}`;
  document.getElementById('chatLog').appendChild(div);
  document.getElementById('chatLog').scrollTop = 9999;
}

// Button events
document.getElementById('menuBtn').addEventListener('click', () => {
  document.getElementById('usersPanel').classList.toggle('hidden');
});

document.getElementById('genUidBtn').addEventListener('click', () => {
  const newUid = generateUID();
  roomId = newUid;
  document.getElementById('roomId').textContent = newUid;
  ws.send(JSON.stringify({ type: 'change-room', newRoomId: newUid }));
  log('New Room UID generated: ' + newUid);
  alert('Room UID: ' + newUid + '\n\nShare this code with users');
});

document.getElementById('sendBtn').addEventListener('click', sendChat);
document.getElementById('chatInput').addEventListener('keypress', (e) => {
  if(e.key === 'Enter') sendChat();
});

function sendChat() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if(msg && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'chat', roomId, msg, name: 'Host' }));
    addChatMsg('Host', msg);
    input.value = '';
  }
}

init();
</script>
</body>
</html>
