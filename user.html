<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User - WebRTC Meeting</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', sans-serif; }
body {
  background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
  min-height:100vh;
  color:#fff;
  padding:15px;
}
.container {
  max-width:500px;
  margin:0 auto;
}
.join-box {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  padding:25px 20px;
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.2);
  margin-bottom:15px;
}
h2 { text-align:center; margin-bottom:15px; font-size:22px; }
input {
  width:100%;
  padding:14px;
  margin-bottom:12px;
  border-radius:10px;
  border:2px solid rgba(255,255,255,0.3);
  background: rgba(0,0,0,0.2);
  color:#fff;
  font-size:16px;
}
.btn {
  width:100%;
  padding:16px;
  border:none;
  border-radius:10px;
  background:#fff;
  color:#1e3c72;
  font-size:17px;
  font-weight:700;
  cursor:pointer;
  margin-bottom:10px;
}
#localVideo {
  width:100%;
  border-radius:15px;
  background:#000;
  display:none;
  margin-bottom:15px;
}
.chat-section {
  display:none;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border-radius:15px;
  padding:12px;
  border:1px solid rgba(255,255,255,0.1);
}
.chat-container {
  display:flex;
  flex-direction:column;
  height:300px;
  background: rgba(0,0,0,0.2);
  border-radius:10px;
  overflow:hidden;
}
.chat-log {
  flex:1;
  overflow-y:auto;
  padding:10px;
  font-size:14px;
  display:flex;
  flex-direction:column;
  gap:6px;
}
.chat-bubble {
  max-width:75%;
  padding:8px 12px;
  border-radius:12px;
  word-wrap:break-word;
}
.chat-bubble.me {
  background:#075e54;
  align-self:flex-end;
  border-bottom-right-radius:4px;
}
.chat-bubble.other {
  background: rgba(255,255,255,0.15);
  align-self:flex-start;
  border-bottom-left-radius:4px;
}
.chat-input-area {
  display:flex;
  align-items:center;
  gap:6px;
  padding:8px;
  background: rgba(0,0,0,0.3);
}
.chat-input-area input {
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
  background: rgba(255,255,255,0.1);
  color:#fff;
  font-size:14px;
  margin-bottom:0;
}
.icon-btn {
  width:40px;
  height:40px;
  border-radius:50%;
  border:none;
  background:#25d366;
  color:#fff;
  font-size:18px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}
.room-info {
  text-align:center;
  background: rgba(16,185,129,0.2);
  padding:8px;
  border-radius:8px;
  margin-bottom:12px;
  font-weight:700;
}
</style>
</head>
<body>
<div class="container">
  <div class="join-box" id="joinBox">
    <h2>🎤 Join Meeting</h2>
    <div class="room-info" id="roomInfo">Room: public</div>
    <input type="text" id="nameInput" placeholder="Enter your full name">
    <input type="text" id="uidInput" placeholder="Enter Room UID - leave empty for public">
    <button class="btn" id="connectBtn">Connect</button>
  </div>

  <video id="localVideo" autoplay muted playsinline></video>

  <div class="chat-section" id="chatSection">
    <div class="chat-container">
      <div class="chat-log" id="chatLog"></div>
      <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="Type a message">
        <button class="icon-btn" id="voiceBtn">🎤</button>
        <button class="icon-btn" id="sendBtn" style="background:#128c7e;">⌨️</button>
      </div>
    </div>
  </div>
</div>

<script>
const WS_URL = 'wss://webrtsc-server.onrender.com';
let ws, localStream, pc, roomId = 'public', myName;

document.getElementById('connectBtn').addEventListener('click', async () => {
  myName = document.getElementById('nameInput').value.trim();
  const uid = document.getElementById('uidInput').value.trim();
  roomId = uid || 'public';

  if(myName.length < 2) {
    alert('Please enter your full name');
    return;
  }

  document.getElementById('roomInfo').textContent = 'Room: ' + roomId;

  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    document.getElementById('localVideo').srcObject = localStream;
    document.getElementById('localVideo').style.display = 'block';
    document.getElementById('joinBox').style.display = 'none';
    document.getElementById('chatSection').style.display = 'block';
    connectWS();
    loadChat();
  } catch(e) {
    alert('Allow camera + mic permission');
  }
});

function connectWS() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'join', role: 'user', roomId, name: myName }));
  };

  ws.onmessage = async (e) => {
    const data = JSON.parse(e.data);
    if(data.type === 'offer') await handleOffer(data);
    if(data.type === 'ice-candidate') await pc.addIceCandidate(data.candidate);
    if(data.type === 'chat') receiveChat(data);
    if(data.type === 'voice') receiveVoice(data);
    if(data.type === 'approve') console.log('Approved by host');
  };
}

async function handleOffer(data) {
  pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
  localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

  pc.onicecandidate = (e) => {
    if(e.candidate) ws.send(JSON.stringify({ type: 'ice-candidate', target: data.from, candidate: e.candidate }));
  };

  await pc.setRemoteDescription(data.offer);
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  ws.send(JSON.stringify({ type: 'answer', target: data.from, answer }));
}

function receiveChat(data) {
  addChatBubble(data.name, data.msg, 'other');
  saveChat(data.name, data.msg, 'other');
}

function receiveVoice(data) {
  addChatBubble(data.name, '🎤 Voice note', 'other');
  saveChat(data.name, '[Voice]', 'other');
}

function addChatBubble(name, msg, type) {
  const div = document.createElement('div');
  div.className = 'chat-bubble ' + type;
  div.innerHTML = `<b>${name}:</b> ${msg}`;
  document.getElementById('chatLog').appendChild(div);
  document.getElementById('chatLog').scrollTop = 99999;
}

function saveChat(name, msg, type) {
  const chats = JSON.parse(localStorage.getItem('userChat_'+roomId) || '[]');
  chats.push({ name, msg, type, time: Date.now() });
  localStorage.setItem('userChat_'+roomId, JSON.stringify(chats));
}

function loadChat() {
  const chats = JSON.parse(localStorage.getItem('userChat_'+roomId) || '[]');
  chats.forEach(c => addChatBubble(c.name, c.msg, c.type));
}

document.getElementById('sendBtn').addEventListener('click', sendChat);
document.getElementById('chatInput').addEventListener('keypress', (e) => {
  if(e.key === 'Enter') sendChat();
});

function sendChat() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if(msg && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'chat', roomId, msg, name: myName }));
    addChatBubble(myName, msg, 'me');
    saveChat(myName, msg, 'me');
    input.value = '';
  }
}

let mediaRecorder, audioChunks = [];
document.getElementById('voiceBtn').addEventListener('click', async () => {
  if(!mediaRecorder || mediaRecorder.state === 'inactive') {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = () => {
      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      audioChunks = [];
      ws.send(JSON.stringify({ type: 'voice', roomId, name: myName }));
      addChatBubble(myName, '🎤 Voice note', 'me');
      saveChat(myName, '[Voice]', 'me');
      stream.getTracks().forEach(t => t.stop());
    };
    mediaRecorder.start();
    document.getElementById('voiceBtn').style.background = '#ef4444';
  } else {
    mediaRecorder.stop();
    document.getElementById('voiceBtn').style.background = '#25d366';
  }
});
</script>
</body>
</html>
