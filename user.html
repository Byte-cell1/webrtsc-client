<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User - WebRTC Meeting</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', sans-serif; }
body {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:15px;
  color:#fff;
}
.container {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  padding:25px 20px;
  border-radius:20px;
  max-width:420px;
  width:100%;
  border:1px solid rgba(255,255,255,0.2);
}
h2 { text-align:center; margin-bottom:20px; font-size:22px; }
input {
  width:100%;
  padding:14px;
  margin-bottom:12px;
  border-radius:10px;
  border:2px solid rgba(255,255,255,0.3);
  background: rgba(0,0,0,0.2);
  color:#fff;
  font-size:16px;
}
input::placeholder { color:rgba(255,255,255,0.6); }
.btn {
  width:100%;
  padding:16px;
  border:none;
  border-radius:10px;
  background:#fff;
  color:#667eea;
  font-size:17px;
  font-weight:700;
  cursor:pointer;
  transition:0.2s;
  margin-bottom:10px;
}
.btn:active { transform:scale(0.98); }
.btn.chat { background:#10b981; color:#fff; }
.status {
  text-align:center;
  margin:10px 0;
  font-size:14px;
  opacity:0.9;
}
#micIndicator {
  width:70px;
  height:70px;
  border-radius:50%;
  background: rgba(255,255,255,0.2);
  margin:15px auto;
  display:none;
  align-items:center;
  justify-content:center;
  font-size:35px;
}
#micIndicator.active {
  display:flex;
  animation:pulse 1s infinite;
  background:#4ade80;
}
@keyframes pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.1); } }
.chat-section {
  display:none;
  margin-top:20px;
}
.chat-section.show { display:block; }
.chat-log {
  height:200px;
  overflow-y:auto;
  background: rgba(0,0,0,0.2);
  border-radius:10px;
  padding:12px;
  font-size:14px;
  margin-bottom:10px;
}
.chat-msg { margin-bottom:8px; word-wrap:break-word; }
.chat-input-box {
  display:flex;
  gap:8px;
}
.chat-input-box input {
  flex:1;
  margin-bottom:0;
}
.room-info {
  text-align:center;
  background: rgba(16,185,129,0.2);
  padding:8px;
  border-radius:8px;
  margin-bottom:15px;
  font-weight:700;
}
</style>
</head>
<body>
<div class="container">
  <h2>🎤 Join Meeting</h2>

  <div class="room-info" id="roomInfo">Room: public</div>

  <input type="text" id="nameInput" placeholder="Enter your full name">
  <input type="text" id="uidInput" placeholder="Enter Room UID - leave empty for public">

  <button class="btn" id="connectBtn">Connect Microphone</button>

  <div id="micIndicator">🎤</div>
  <div class="status" id="status">Enter name, then connect</div>

  <div class="chat-section" id="chatSection">
    <h3 style="margin-bottom:10px;">💬 Chat</h3>
    <div class="chat-log" id="chatLog"></div>
    <div class="chat-input-box">
      <input type="text" id="chatInput" placeholder="Type message...">
      <button class="btn chat" id="sendBtn">Send</button>
    </div>
  </div>
</div>

<script>
const WS_URL = 'wss://webrtsc-server.onrender.com';
let ws, localStream, pc, roomId = 'public', myName;

document.getElementById('connectBtn').addEventListener('click', async () => {
  myName = document.getElementById('nameInput').value.trim();
  const uid = document.getElementById('uidInput').value.trim();
  roomId = uid || 'public';

  if(myName.length < 2) {
    alert('Please enter your full name');
    return;
  }

  document.getElementById('roomInfo').textContent = 'Room: ' + roomId;
  document.getElementById('status').textContent = 'Requesting microphone...';

  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    document.getElementById('micIndicator').classList.add('active');
    document.getElementById('status').textContent = 'Microphone connected ✓';
    document.getElementById('chatSection').classList.add('show');
    connectWS();
  } catch(e) {
    document.getElementById('status').textContent = 'Mic permission denied';
    alert('Allow microphone permission then refresh');
  }
});

function connectWS() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'join', role: 'user', roomId, name: myName }));
    document.getElementById('status').textContent = 'Connected to room: ' + roomId + ' ✓';
  };

  ws.onmessage = async (e) => {
    const data = JSON.parse(e.data);
    if(data.type === 'offer') await handleOffer(data);
    if(data.type === 'ice-candidate') await pc.addIceCandidate(data.candidate);
    if(data.type === 'chat') addChatMsg(data.name, data.msg);
  };
}

async function handleOffer(data) {
  pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
  localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

  pc.onicecandidate = (e) => {
    if(e.candidate) ws.send(JSON.stringify({ type: 'ice-candidate', target: data.from, candidate: e.candidate }));
  };

  await pc.setRemoteDescription(data.offer);
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  ws.send(JSON.stringify({ type: 'answer', target: data.from, answer }));
}

function addChatMsg(name, msg) {
  const div = document.createElement('div');
  div.className = 'chat-msg';
  div.innerHTML = `<b>${name}:</b> ${msg}`;
  document.getElementById('chatLog').appendChild(div);
  document.getElementById('chatLog').scrollTop = 9999;
}

document.getElementById('sendBtn').addEventListener('click', sendChat);
document.getElementById('chatInput').addEventListener('keypress', (e) => {
  if(e.key === 'Enter') sendChat();
});

function sendChat() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if(msg && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'chat', roomId, msg, name: myName }));
    addChatMsg(myName, msg);
    input.value = '';
  }
}
</script>
</body>
</html>
