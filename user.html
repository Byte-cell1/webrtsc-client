<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User - WebRTC Meeting</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', sans-serif; }
body {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  color:#fff;
}
.container {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  padding:30px 20px;
  border-radius:20px;
  max-width:400px;
  width:100%;
  border:1px solid rgba(255,255,255,0.2);
}
h2 { text-align:center; margin-bottom:20px; font-size:24px; }
input {
  width:100%;
  padding:14px;
  margin-bottom:15px;
  border-radius:10px;
  border:2px solid rgba(255,255,255,0.3);
  background: rgba(0,0,0,0.2);
  color:#fff;
  font-size:16px;
}
input::placeholder { color:rgba(255,255,255,0.6); }
.btn {
  width:100%;
  padding:16px;
  border:none;
  border-radius:10px;
  background:#fff;
  color:#667eea;
  font-size:18px;
  font-weight:700;
  cursor:pointer;
  transition:0.2s;
}
.btn:active { transform:scale(0.98); }
.status {
  text-align:center;
  margin-top:15px;
  font-size:14px;
  opacity:0.9;
}
#micIndicator {
  width:80px;
  height:80px;
  border-radius:50%;
  background: rgba(255,255,255,0.2);
  margin:20px auto;
  display:none;
  align-items:center;
  justify-content:center;
  font-size:40px;
}
#micIndicator.active {
  display:flex;
  animation:pulse 1s infinite;
  background:#4ade80;
}
@keyframes pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.1); } }
</style>
</head>
<body>
<div class="container">
  <h2>🎤 Join Meeting</h2>
  <input type="text" id="nameInput" placeholder="Enter your full name">
  <input type="text" id="roomInput" placeholder="Room ID" value="default">
  <button class="btn" id="connectBtn">Connect Microphone</button>
  <div id="micIndicator">🎤</div>
  <div class="status" id="status">Enter name + room, then connect</div>
</div>

<script>
const WS_URL = 'wss://webrtsc-server.onrender.com';
let ws, localStream, pc, roomId, myName;

document.getElementById('connectBtn').addEventListener('click', async () => {
  myName = document.getElementById('nameInput').value.trim();
  roomId = document.getElementById('roomInput').value.trim() || 'default';

  if(myName.length < 2) {
    alert('Please enter your full name');
    return;
  }

  document.getElementById('status').textContent = 'Requesting microphone...';

  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    document.getElementById('micIndicator').classList.add('active');
    document.getElementById('status').textContent = 'Microphone connected ✓';
    connectWS();
  } catch(e) {
    document.getElementById('status').textContent = 'Mic permission denied';
    alert('Allow microphone permission then refresh');
  }
});

function connectWS() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'join', role: 'user', roomId, name: myName }));
    document.getElementById('status').textContent = 'Connected to room ✓';
  };

  ws.onmessage = async (e) => {
    const data = JSON.parse(e.data);
    if(data.type === 'offer') await handleOffer(data);
    if(data.type === 'ice-candidate') await pc.addIceCandidate(data.candidate);
  };
}

async function handleOffer(data) {
  pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
  localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

  pc.onicecandidate = (e) => {
    if(e.candidate) ws.send(JSON.stringify({ type: 'ice-candidate', target: data.from, candidate: e.candidate }));
  };

  await pc.setRemoteDescription(data.offer);
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  ws.send(JSON.stringify({ type: 'answer', target: data.from, answer }));
}
</script>
</body>
</html>
